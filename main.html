<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>D.ip - Registration</title>
    <style>
        /* Сброс всех багов отображения и выравнивание по центру экрана */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: #ffffff !important;
            font-family: 'Arial Black', 'Impact', sans-serif !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            overflow: hidden !important;
            box-sizing: border-box !important;
        }

        /* Шапка: Логотип и жирный текст Registration с белыми буквами и черным контуром */
        .reg-header {
            position: absolute !important;
            top: 25px !important;
            left: 20px !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            z-index: 10 !important;
        }
        .header-logo {
            width: 55px !important;
            height: 55px !important;
            border-radius: 50% !important;
            object-fit: cover !important;
        }
        .header-title {
            font-size: 2.2rem !important;
            font-weight: 900 !important;
            color: #ffffff !important; /* Внутри буквы белые */
            margin: 0 !important;
            text-transform: capitalize !important;
            letter-spacing: -1px !important;
            /* Жирный черный контур как на рисунке */
            -webkit-text-stroke: 2px #000000 !important;
        }

        /* Оболочка для карточки */
        .main-wrapper {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            width: 100% !important;
            height: 100% !important;
            padding: 20px !important;
            box-sizing: border-box !important;
        }

        /* Округлая серая карточка ровно по центру */
        .card-container {
            background-color: #8e8e93 !important;
            border-radius: 24px !important;
            padding: 55px 25px 40px 25px !important;
            width: 100% !important;
            max-width: 380px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 45px !important;
            box-sizing: border-box !important;
        }

        /* Белая прямоугольная строка ввода */
        .input-row {
            display: flex !important;
            align-items: center !important;
            background-color: #ffffff !important;
            border-radius: 0px !important; /* Убираем скругления по макету */
            padding: 5px 5px 5px 12px !important;
            width: 100% !important;
            box-sizing: border-box !important;
            border: 3px solid #ffffff !important;
        }

        /* Поле ввода: Белые буквы с жирным черным контуром */
        #emailInput {
            flex: 1 !important;
            border: none !important;
            outline: none !important;
            font-size: 1.4rem !important;
            font-weight: 900 !important;
            color: #ffffff !important; 
            font-family: 'Arial Black', sans-serif !important;
            background: transparent !important;
            padding: 5px 0 !important;
            letter-spacing: -0.5px !important;
            -webkit-text-stroke: 1.5px #000000 !important;
        }
        
        /* Текст-подсказка Enter your email */
        #emailInput::placeholder {
            color: #ffffff !important;
            opacity: 1 !important;
            -webkit-text-stroke: 1.5px #000000 !important;
        }

        /* Синяя круглая кнопка */
        .btn-arrow {
            background-color: #1565c0 !important;
            border: none !important;
            border-radius: 50% !important;
            width: 46px !important;
            height: 46px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            cursor: pointer !important;
            flex-shrink: 0 !important;
            padding: 0 !important;
        }

        /* Подвал карточки: Логотип Google и серый текст Gmail с контуром */
        .gmail-footer {
            display: flex !important;
            align-items: center !important;
            gap: 15px !important;
            width: 100% !important;
        }
        .gmail-icon {
            width: 36px !important;
            height: auto !important;
        }
        .gmail-text {
            font-size: 1.8rem !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            text-transform: capitalize !important;
            -webkit-text-stroke: 1.5px #7a7a7a !important; /* Серый контур букв */
        }
    </style>
</head>
<body>

    <!-- Шапка D. ip -->
    <header class="reg-header">
        <img src="logo.png" alt="D.ip Logo" class="header-logo">
        <h1 class="header-title">Registration</h1>
    </header>

    <!-- Центрированная карточка -->
    <div class="main-wrapper">
        <div class="card-container">
            
            <form id="authForm" class="input-row">
                <input type="email" id="emailInput" placeholder="Enter your email" required autocomplete="email">
                
                <!-- Круглая синяя кнопка со значком СКАЧИВАНИЯ (стрелка вниз и линия) -->
                <button type="submit" class="btn-arrow" aria-label="Continue">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://w3.org" style="width: 24px; height: 24px;">
                        <path d="M12 4V16M12 16L18 10M12 16L6 10M4 20H20" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>

            <!-- Подвал с Gmail -->
            <div class="gmail-footer">
                <img src="https://wikimedia.org" alt="Gmail" class="gmail-icon">
                <span class="gmail-text">Gmail</span>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
