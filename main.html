<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.ip - Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="reg-header">
        <img src="logo.png" alt="D.ip Logo" class="header-logo">
        <h1 class="header-title">Registration</h1>
    </header>
    <main class="reg-main">
        <div class="card-container">
            <form id="authForm" class="input-row">
                <input type="email" id="emailInput" placeholder="Enter your email" required autocomplete="email">
                <button type="submit" class="btn-arrow" aria-label="Продолжить">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                        <path d="M12 5V19M12 19L19 12M12 19L5 12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
            <div class="gmail-footer">
                <img src="https://wikimedia.org" alt="Gmail" class="gmail-icon">
                <span class="gmail-text">Gmail</span>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
